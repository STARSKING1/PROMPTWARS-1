<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanGuard Live — Real-Time Mobility Intel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app-container">
    <header id="main-header">
      <div class="brand">
        <span class="logo">🛡️</span>
        <div class="brand-text">
          <h1>UrbanGuard <span class="live-tag">LIVE</span></h1>
          <p>Network Intelligence Engine</p>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat-item">
          <span class="label">♻️ ECO IMPACT</span>
          <span id="eco-ledger" class="value positive">0g saved</span>
        </div>
        <div class="stat-item">
          <span class="label">PQC DATA LAYER</span>
          <span class="value secure-pulse">SECURE</span>
        </div>
      </div>
    </header>

    <main id="dashboard">
      <aside class="sidebar glass">
        <section class="planner">
          <h3><span class="icon">🔍</span> Movement Planner</h3>
          <div class="input-group">
            <input type="text" id="origin-input" placeholder="Origin (Current Location)">
            <input type="text" id="destination-input" placeholder="Where to?">
          </div>
          <button id="btn-analyze" class="primary-btn">Analyze Optimal Route</button>
        </section>

        <section class="toggles">
          <h3>Journey Support</h3>
          <label class="switch-label">
            <input type="checkbox" id="toggle-heatmap">
            <span class="switch"></span> Urban Pulse (Heatmap)
          </label>
          <label class="switch-label">
            <input type="checkbox" id="toggle-hospitals">
            <span class="switch"></span> Emergency Infrastructure
          </label>
        </section>
      </aside>

      <section id="map-container">
        <div id="map"></div>
      </section>
    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>

</html>
